name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend: lint + tests ──────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Type-check with mypy
        continue-on-error: true
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports --no-strict-optional

      - name: Audit dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run tests with coverage
        timeout-minutes: 10
        run: pytest --cov=lineage_agent --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Frontend: lint + build ─────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Change detection ──────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            mobile:
              - 'mobile/**'

  # ── Mobile: lint + type-check ─────────────────────────────────
  mobile-lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.mobile == 'true'

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  # ── Mobile: Jest unit tests ───────────────────────────────────
  mobile-test:
    runs-on: ubuntu-latest
    needs: [detect-changes, mobile-lint]
    if: always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.mobile == 'true' && needs.mobile-lint.result == 'success'

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --coverage --ci --passWithNoTests
        env:
          CI: true

      - name: Upload mobile coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 14

  # ── OpenAPI schema drift detection ───────────────────────────
  openapi-drift:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install openapi-typescript
        run: npm install -g openapi-typescript@7

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Start backend
        run: |
          python -m uvicorn src.lineage_agent.api:app \
            --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "uvicorn PID=$!"
        env:
          SECRET_KEY: ci-secret
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          ARQ_REDIS_URL: ""
          SOLANA_RPC_ENDPOINT: https://api.mainnet-beta.solana.com
          PYTHONPATH: src

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend did not start within 60 seconds — last 40 lines of uvicorn log:"
          tail -40 /tmp/uvicorn.log || true
          exit 1

      - name: Regenerate types from live schema
        run: |
          openapi-typescript http://localhost:8000/openapi.json -o /tmp/api.generated.ts

      - name: Diff against committed types
        run: |
          if ! diff -q /tmp/api.generated.ts mobile/src/types/api.generated.ts > /dev/null 2>&1; then
            echo "::error::OpenAPI schema drift detected — run 'npm run gen:types' in mobile/ and commit the result."
            diff /tmp/api.generated.ts mobile/src/types/api.generated.ts | head -80
            exit 1
          fi
          echo "Schema is up to date ✓"

  # ── Mobile: EAS OTA update ─────────────────────────────────────
  mobile-ota:
    runs-on: ubuntu-latest
    needs: [detect-changes, mobile-lint, mobile-test]
    if: always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.mobile == 'true' && needs.mobile-lint.result == 'success' && needs.mobile-test.result == 'success'

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update (production)
        run: |
          eas update --channel production --message "CI: ${{ github.sha }}" --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://lineage-agent.fly.dev
          EXPO_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Publish OTA update (preview)
        run: |
          eas update --channel preview --message "CI: ${{ github.sha }}" --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://lineage-agent.fly.dev
          EXPO_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ── Docker build smoke-test ────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build --target backend -t lineage-backend:ci .

      - name: Build frontend image
        run: docker build --target frontend -t lineage-frontend:ci .
