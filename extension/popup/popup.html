<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #020617;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2D1B69, #4F46E5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: rgba(173, 200, 255, 0.4);
    }
    input::placeholder {
      color: rgba(255,255,255,0.2);
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #2D1B69, #4F46E5);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .status {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 12px;
    }
    .status.success { color: #00FF88; }
    .status.error { color: #FF3366; }
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 16px 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
    }
    .info-label { color: rgba(255,255,255,0.4); }
    .info-value { color: rgba(255,255,255,0.8); font-weight: 600; }
    a {
      color: rgba(173, 200, 255, 0.8);
      text-decoration: none;
      font-size: 12px;
    }
    a:hover { text-decoration: underline; }
    .footer {
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">L</div>
    <div>
      <div class="title">Lineage Agent</div>
      <div class="subtitle">Solana Token Scanner</div>
    </div>
  </div>

  <div class="section">
    <label>API Key (optional)</label>
    <input type="password" id="apiKey" placeholder="lin_..." />
  </div>

  <button class="btn" id="saveBtn">Save Settings</button>
  <div class="status" id="status"></div>

  <div class="divider"></div>

  <div class="section">
    <label>Quick Scan</label>
    <input type="text" id="mintInput" placeholder="Enter token mint address..." />
  </div>
  <button class="btn" id="scanBtn" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);">
    Scan Token
  </button>

  <div class="divider"></div>

  <div class="info-row">
    <span class="info-label">Version</span>
    <span class="info-value">1.0.0</span>
  </div>
  <div class="info-row">
    <span class="info-label">Supported sites</span>
    <span class="info-value">DexScreener, Birdeye, Photon</span>
  </div>

  <div class="footer">
    <a href="https://lineage-agent.fly.dev" target="_blank">Open Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
