appId: com.lineage.agent
---
# Flow: Search — type a query, see results, open a token detail

- launchApp

# Navigate to Search tab
- tapOn:
    text: "Search"

# Type a search query
- tapOn:
    id: "search-input"
- inputText: "PEPE"

# Wait for results list
- waitForAnimationToEnd

# Assert at least one result appeared
- assertVisible:
    id: "search-results-list"

# Tap the first result
- tapOn:
    index: 0
    id: "token-card"

# Verify lineage / detail screen loaded
- assertVisible:
    id: "lineage-screen"
